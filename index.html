<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

    <title>Rutina Luis Diego Mora</title>

    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1c1c1c;
            --accent: #2ecc71;
            --danger: #e74c3c;
            --blue: #3498db;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, Arial;
            background: var(--bg);
            color: white;
            min-height: 100svh;
        }

        header {
            padding: 16px;
            text-align: center;
            font-weight: 600;
            background: #1a1a1a;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .container {
            padding: 12px;
            max-width: 700px;
            margin: auto;
        }

        .day {
            background: var(--card);
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .day-header {
            padding: 16px;
            font-weight: 600;
            background: #262626;
            cursor: pointer;
        }

        .day-content {
            display: none;
            padding: 12px;
        }

        .exercise {
            background: #232323;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
        }

        input[type="number"] {
            width: 70px;
            height: 42px;
            font-size: 16px;
            background: #111;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            text-align: center;
        }

        button {
            border: none;
            border-radius: 8px;
            padding: 10px 12px;
            min-height: 44px;
            font-size: 15px;
            cursor: pointer;
        }

        .video {
            background: var(--danger);
            color: white;
        }

        .timer-btn {
            background: var(--blue);
            color: white;
        }

        .next {
            background: var(--accent);
            width: 100%;
            margin-top: 10px;
            font-size: 16px;
        }

        .progress {
            height: 6px;
            background: #333;
        }

        .bar {
            height: 6px;
            background: var(--accent);
            width: 0%;
        }

        .timer {
            text-align: center;
            font-size: 28px;
            padding: 12px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        iframe {
            width: 92%;
            max-width: 600px;
            aspect-ratio: 16/9;
            border: none;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 32px;
            cursor: pointer;
        }

        .reset {
            width: 100%;
            background: #f39c12;
            margin-top: 10px;
        }

        @media(max-width:600px) {

            .row {
                flex-direction: column;
                align-items: flex-start;
            }

        }
    </style>
</head>

<body>

    <header>Rutina Funcional</header>

    <div class="timer" id="timer">00:00</div>

    <div class="container" id="workout"></div>

    <button class="next" onclick="nextExercise()">Siguiente ejercicio ▶</button>
    <button class="reset" onclick="resetWeek()">Reset semana</button>

    <div class="modal" id="videoModal">
        <div class="close" onclick="closeVideo()">✕</div>
        <iframe id="youtube"></iframe>
    </div>

    <script>

        const routine = {

            "Día 1 – Pecho + Tríceps": [
                ["Press banca", "bench press barbell"],
                ["Press inclinado mancuernas", "incline dumbbell press"],
                ["Peck deck", "pec deck machine"],
                ["Fondos en banco", "bench dips triceps"],
                ["Flexiones", "push ups exercise"],
                ["Tríceps polea", "cable triceps pushdown"]
            ],

            "Día 2 – Pierna": [
                ["Sentadilla rack", "barbell squat"],
                ["Prensa de pierna", "leg press machine"],
                ["Peso muerto rumano", "romanian deadlift"],
                ["Step ups", "step ups dumbbells"],
                ["Pantorrillas", "calf raises"],
                ["Kettlebell swings", "kettlebell swings"]
            ],

            "Día 3 – Cardio": [
                ["Bicicleta 35-40 min", "stationary bike cardio workout"]
            ],

            "Día 4 – Espalda + Bíceps": [
                ["Dominadas", "pull ups"],
                ["Jalón polea", "lat pulldown"],
                ["Remo mancuernas", "dumbbell row"],
                ["Curl bíceps barra", "barbell curl"],
                ["Curl martillo", "hammer curl"],
                ["Face pulls", "face pulls resistance band"]
            ],

            "Día 5 – Hombros + Core": [
                ["Press militar", "dumbbell shoulder press"],
                ["Elevaciones laterales", "lateral raises"],
                ["Elevaciones posteriores", "rear delt raises"],
                ["Encogimientos trapecio", "dumbbell shrugs"],
                ["Kettlebell swings", "kettlebell swings"],
                ["Crunch", "bench crunch abs"],
                ["Elevaciones piernas", "leg raises abs"],
                ["Plancha", "plank core exercise"]
            ]

        }

        const container = document.getElementById("workout")

        Object.keys(routine).forEach(day => {

            let html = `<div class="day">
<div class="day-header" onclick="toggle(this)">${day}</div>
<div class="progress"><div class="bar"></div></div>
<div class="day-content">`

            routine[day].forEach(ex => {

                html += `

<div class="exercise">

<div class="row">

<label>
<input type="checkbox" onchange="save()">
${ex[0]}
</label>

<div>

<input type="number" placeholder="kg" onchange="save()">

<button class="video" onclick="video('${ex[1]}')">▶</button>

<button class="timer-btn" onclick="startTimer(60)">⏱</button>

</div>

</div>

</div>

`

            })

            html += `</div></div>`

            container.innerHTML += html

        })

        function toggle(el) {

            let content = el.parentElement.querySelector(".day-content")

            content.style.display =
                content.style.display === "block" ? "none" : "block"

        }

        function video(query) {

            let url = "https://www.youtube.com/embed?listType=search&list=" + encodeURIComponent(query)

            document.getElementById("youtube").src = url

            document.getElementById("videoModal").style.display = "flex"

        }

        function closeVideo() {

            document.getElementById("videoModal").style.display = "none"

            document.getElementById("youtube").src = ""

        }

        let countdown

        function startTimer(sec) {

            clearInterval(countdown)

            let time = sec

            let audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg")

            countdown = setInterval(() => {

                let m = Math.floor(time / 60)
                let s = time % 60

                document.getElementById("timer").innerHTML =
                    String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0")

                time--

                if (time < 0) {

                    clearInterval(countdown)

                    audio.play().catch(() => { })

                    document.getElementById("timer").innerHTML = "GO"

                }

            }, 1000)

        }

        function save() {

            let data = []

            document.querySelectorAll(".exercise").forEach(e => {

                let check = e.querySelector("input[type=checkbox]").checked
                let weight = e.querySelector("input[type=number]").value

                data.push({ check, weight })

            })

            localStorage.setItem("gymData", JSON.stringify(data))

            updateProgress()

        }

        function load() {

            let saved = JSON.parse(localStorage.getItem("gymData"))

            if (!saved) return

            document.querySelectorAll(".exercise").forEach((e, i) => {

                if (!saved[i]) return

                e.querySelector("input[type=checkbox]").checked = saved[i].check
                e.querySelector("input[type=number]").value = saved[i].weight

            })

            updateProgress()

        }

        function updateProgress() {

            document.querySelectorAll(".day").forEach(day => {

                let checks = day.querySelectorAll("input[type=checkbox]")
                let bar = day.querySelector(".bar")

                let done = 0

                checks.forEach(c => { if (c.checked) done++ })

                bar.style.width = (done / checks.length) * 100 + "%"

            })

        }

        function nextExercise() {

            let boxes = [...document.querySelectorAll("input[type=checkbox]")]

            for (let b of boxes) {

                if (!b.checked) {

                    b.scrollIntoView({ behavior: "smooth", block: "center" })
                    return

                }

            }

            alert("Entrenamiento terminado 💪")

        }

        function resetWeek() {

            localStorage.removeItem("gymData")
            location.reload()

        }

        load()

    </script>

</body>

</html>
