<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fitness App</title>

<style>
/**/
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

.hero{
height:100vh;
width:100%;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;

background:url("images/background-02-1920x750.jpg") center/cover no-repeat;

position:relative;
}

/* Imagen de fondo */

.hero-bg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:1;
}

/* overlay oscuro */

.hero::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
z-index:1;
}

/* contenido */

.hero-content{
position:relative;
z-index:2;
max-width:600px;
padding:20px;
}

.hero h1{
font-family:'Ubuntu', Helvetica, Arial, sans-serif;
font-style:italic;
font-weight:700;
font-size:40px;
letter-spacing:4px;
text-transform:uppercase;
color:white;
text-align:center;
margin-bottom:15px;
}

.hero p{
font-size:16px;
line-height:1.5;
margin-bottom:25px;
color:#ffffff;
}

/* botón */

.cta{
background:#7c3aed;
color:white;
border:none;
padding:14px 32px;
font-weight:600;
border-radius:8px;
cursor:pointer;
font-size:14px;
transition:all .2s ease;
}

.cta:active{
transform:scale(0.95);
}

.cta:hover{
background:#6d28d9;
}

/* DESKTOP */

@media (min-width:768px){

.hero h1{
font-size:64px;
}

.hero p{
font-size:20px;
max-width:700px;
margin:auto;
margin-bottom:30px;
}

}

</style>
</head>


<body>

<section class="hero">

<div class="hero-content">

<h1>NEVER GIVE UP</h1>

<p>
Every bodybuilder requires a lot of dedication and effort to shape his/her body into something to be proud of.
</p>

<a href="./routine.html"><button class="cta">GET STARTED</button></a>

</div>

</section>

</body>
</html>
